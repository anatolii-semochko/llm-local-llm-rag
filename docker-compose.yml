version: '3.8'

services:
  app:
    build: .
    container_name: llm-api-service
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - NODE_ENV=production
      - API_KEY=agent-007
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_BASE_URL=http://ollama:11434
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=rag
      - LOG_LEVEL=info
      - LOG_FILE=logs/app.log
      - DEFAULT_CHAT_MODEL=qwen3:14b
      - DEFAULT_EMBEDDING_MODEL=nomic-embed-text
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - ollama
      - postgres
    networks:
      - llm-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ./docker/ollama:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_ORIGINS=*
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llm-network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres-rag
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5437:5432"
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - llm-network

networks:
  llm-network:
    driver: bridge

volumes:
  ollama-data:
  postgres-data: